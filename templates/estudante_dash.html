{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Estudante | ESURA</title>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body style="margin: 0; background: #fdfdfd; font-family: -apple-system, sans-serif;">

    <!-- Topo -->
    <div style="width: 100%; padding: 15px 25px; background: #fff; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;">
        <img src="{% static 'img/logo_ujc.png' %}" style="width: 50px;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="text-align: right;">
                <p style="font-size: 11px; margin: 0; font-weight: 800; color: #07041b;">{{ user.username }}</p>
                <p style="font-size: 9px; margin: 0; color: #999;">Estudante</p>
            </div>
            <a href="{% url 'logout' %}" style="color: #ff4d4d; font-size: 14px;"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </div>

    <!-- Conteúdo -->
    <div style="max-width: 600px; margin: 30px auto; padding: 0 20px;">
        <h1 style="font-size: 20px; font-weight: 900; color: #07041b; margin-bottom: 5px;">O meu Percurso</h1>
        <p style="font-size: 12px; color: #666; margin-bottom: 30px;">Consulta as tuas cadeiras e desempenho académico.</p>

        <!-- Grade de Opções -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div style="background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #eee; text-align: center; cursor: pointer;">
                <i class="fas fa-book-open" style="font-size: 24px; color: #0081C9; margin-bottom: 10px;"></i>
                <p style="font-size: 12px; font-weight: bold; margin: 0;">Minhas Disciplinas</p>
            </div>
            <div style="background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #eee; text-align: center; cursor: pointer;">
                <i class="fas fa-file-invoice" style="font-size: 24px; color: #0081C9; margin-bottom: 10px;"></i>
                <p style="font-size: 12px; font-weight: bold; margin: 0;">Ver Notas</p>
            </div>
        </div>

        <!-- Alerta de Mensagem (Exemplo) -->
        <div style="margin-top: 25px; padding: 15px; background: #e8f4fd; border-radius: 15px; border-left: 5px solid #0081C9;">
            <p style="font-size: 11px; color: #0081C9; margin: 0;"><strong>Aviso:</strong> As inscrições para os exames de recorrência estão abertas até dia 30.</p>
        </div>
    </div>

</body>
</html>
