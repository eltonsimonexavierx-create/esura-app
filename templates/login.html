{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA</title>
    <!-- Chamada direta do CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background: #fff;">
        <div style="width: 320px; padding: 40px 30px; border: 1px solid #ddd; border-radius: 25px; text-align: center;">
            <img src="/static/img/logo_ujc.png" style="width: 140px; margin-bottom: 20px;">
            <p style="font-weight: bold; margin: 0; color: #333;">Bem-vindo ao</p>
            <h1 style="font-size: 26px; font-weight: 900; margin: 5px 0 30px 0;">ESURA</h1>

            <form method="POST">
                {% csrf_token %}
                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">Utilizador/Email</label>
                    <input type="text" name="username" style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box;">
                </div>

                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">Senha *</label>
                    <input type="password" name="password" style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box;">
                </div>

                <a href="#" style="display: block; text-align: left; color: #0081C9; text-decoration: none; font-size: 13px; margin-bottom: 20px;">Esqueceu a senha?</a>

                <button type="submit" style="width: 100%; padding: 12px; background: #fff; border: 1.5px solid #0081C9; color: #0081C9; border-radius: 30px; font-size: 16px; cursor: pointer;">→ Entrar</button>
            </form>
            <p style="margin-top: 40px; color: #aaa; font-size: 11px;">v 2026.03.12-30431ca</p>
        </div>
    </div>
</body>
</html>
