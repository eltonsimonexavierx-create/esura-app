<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA</title>
</head>
<body style="margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif;">

    <div style="width: 100%; max-width: 340px; padding: 40px 25px; border: 1px solid #e0e0e0; border-radius: 25px; text-align: center; box-sizing: border-box;">
        
        <!-- LOGOTIPO EM SVG (VETORIZADO) - O PRÓPRIO CÓDIGO DESENHA A LOGO -->
        <div style="margin-bottom: 20px; display: flex; justify-content: center;">
            <svg width="150" height="100" viewBox="0 0 100 60" xmlns="http://w3.org">
                <path d="M10 5 L35 5 L35 35 Q35 50 55 50 Q75 50 75 35 L75 5 L100 5 L100 35 Q100 65 55 65 Q10 65 10 35 Z" fill="#0081C9"/>
                <rect x="40" y="5" width="30" height="30" fill="#000"/>
                <text x="50" y="80" font-family="Arial" font-size="7" font-weight="bold" text-anchor="middle" fill="#0081C9">UJC - JOAQUIM CHISSANO</text>
            </svg>
        </div>
        
        <p style="font-size: 1.1rem; font-weight: bold; margin: 0; color: #333;">Bem-vindo ao</p>
        <h1 style="font-size: 26px; font-weight: 900; margin: 5px 0 35px 0; color: #000;">ESURA</h1>

        <form method="POST">
            {% csrf_token %}
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Utilizador/Email</label>
                <input type="text" name="username" placeholder="Digite o Utilizador" required 
                       style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box; font-size: 14px; outline: none;">
            </div>

            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Senha *</label>
                <input type="password" name="password" placeholder="Digite sua senha" required 
                       style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box; font-size: 14px; outline: none;">
            </div>

            <a href="#" style="display: block; text-align: left; color: #0081C9; text-decoration: none; font-size: 13px; margin-bottom: 25px;">Esqueceu a senha?</a>

            <button type="submit" style="width: 100%; padding: 12px; background: #fff; border: 1.5px solid #0081C9; color: #0081C9; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center;">
                <span style="margin-right: 10px; font-size: 22px;">→</span> Entrar
            </button>
        </form>

        <span style="display: block; margin-top: 45px; color: #aaa; font-size: 11px;">v 2026.03.12-30431ca</span>
    </div>

</body>
</html>
