<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA</title>
</head>
<body style="margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif;">
    <div style="width: 100%; max-width: 340px; padding: 40px 25px; border: 1px solid #e0e0e0; border-radius: 25px; text-align: center; box-sizing: border-box;">
        
        <!-- LOGO OFICIAL (Link direto para evitar erro de pasta) -->
        <img src="https://ujc.ac.mz" alt="Logo UJC" style="width: 140px; margin-bottom: 20px;">
        
        <p style="font-size: 1.1rem; font-weight: bold; margin: 0; color: #333;">Bem-vindo ao</p>
        <h1 style="font-size: 1.8rem; font-weight: 900; margin: 5px 0 30px 0; color: #000;">ESURA</h1>

        <form method="POST">
            {% csrf_token %}
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 8px; margin-left: 5px;">Utilizador/Email</label>
                <input type="text" name="username" placeholder="Digite o Utilizador" required style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box; font-size: 14px; outline: none;">
            </div>

            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display: block; font-size: 13px; color: #666; margin-bottom: 8px; margin-left: 5px;">Senha *</label>
                <input type="password" name="password" placeholder="Digite sua senha" required style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box; font-size: 14px; outline: none;">
            </div>

            <a href="#" style="display: block; text-align: left; color: #0081C9; text-decoration: none; font-size: 13px; margin: 15px 0 25px 5px;">Esqueceu a senha?</a>

            <button type="submit" style="width: 100%; padding: 12px; background: #fff; border: 1.5px solid #0081C9; color: #0081C9; border-radius: 30px; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold;">
                <span style="margin-right: 10px; font-size: 20px;">→</span> Entrar
            </button>
        </form>

        <p style="margin-top: 40px; color: #aaa; font-size: 11px; font-family: monospace;">v 2026.03.12-30431ca</p>
    </div>
</body>
</html>
