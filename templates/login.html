{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - ESURA</title>
</head>
<body style="margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

    <div style="width: 300px; padding: 30px 25px; border: 1px solid #e0e0e0; border-radius: 20px; text-align: center; box-sizing: border-box;">
        
        <!-- Logo -->
        <img src="{% static 'img/logo_ujc.png' %}" alt="Logo UJC" style="width: 130px; margin-bottom: 15px;">
        
        <p style="font-size: 16px; font-weight: 600; margin: 0; color: #444;">Bem-vindo ao</p>
        <h1 style="font-size: 24px; font-weight: 900; margin: 5px 0 25px 0; color: #000; letter-spacing: 0.5px;">ESURA</h1>

        <form method="POST">
            {% csrf_token %}
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display: block; font-size: 13px; color: #777; margin-bottom: 5px; margin-left: 10px;">Utilizador/Email</label>
                <input type="text" name="username" placeholder="Digite o Utilizador" required 
                       style="width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 25px; box-sizing: border-box; font-size: 14px; outline: none;">
            </div>

            <div style="text-align: left; margin-bottom: 8px;">
                <label style="display: block; font-size: 13px; color: #777; margin-bottom: 2px; margin-left: 10px;">Senha *</label>
                <div style="position: relative;">
                    <input type="password" name="password" placeholder="Digite sua senha" required 
                           style="width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 25px; box-sizing: border-box; font-size: 14px; outline: none;">
                    <span style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #666; cursor: pointer;">👁</span>
                </div>
            </div>

            <a href="#" style="display: block; text-align: left; color: #0081C9; text-decoration: none; font-size: 12px; margin: 10px 0 25px 10px;">Esqueceu a senha?</a>

            <button type="submit" style="width: 100%; padding: 8px; background: #fff; border: 1.2px solid #0081C9; color: #0081C9; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center;">
                <span style="margin-right: 8px; font-size: 18px;">➔</span> Entrar
            </button>
        </form>

        <span style="display: block; margin-top: 20px; color: #bbb; font-size: 10px; font-family: monospace;">v 2026.03.12-30431ca</span>
    </div>

</body>
</html>
