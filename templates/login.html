{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body style="margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif;">

    <!-- Card Ultra Magro: Reduzido para 150px para máximo efeito vertical -->
    <div style="width: 150px; padding: 40px 8px; border: 1px solid #f2f2f2; border-radius: 25px; background: #fff; text-align: center; box-sizing: border-box;">
        
        <!-- Logo adaptado à nova largura -->
        <img src="{% static 'img/logo_ujc.png' %}" style="width: 110px; height: auto; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto;">
        
        <h2 style="font-size: 11px; font-weight: 700; margin: 0; color: #555; letter-spacing: 0.1px;">Bem-vindo ao</h2>
        <h1 style="font-size: 16px; font-weight: 900; margin: 2px 0 25px 0; color: #000; letter-spacing: -0.5px;">ESURA</h1>

        <form method="POST" style="text-align: left;">
            {% csrf_token %}
            
            <!-- Campos comprimidos lateralmente -->
            <div style="margin-bottom: 15px;">
                <label style="font-size: 9px; color: #777; display: block; margin-bottom: 5px; font-weight: bold; padding-left: 4px;">Utilizador</label>
                <input type="text" name="username" placeholder="Digite..." required 
                       style="width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 15px; box-sizing: border-box; font-size: 10px; outline: none; background: #fafafa;">
            </div>

            <div style="margin-bottom: 8px; position: relative;">
                <label style="font-size: 9px; color: #777; display: block; margin-bottom: 5px; font-weight: bold; padding-left: 4px;">Senha <span style="color: red;">*</span></label>
                <input type="password" name="password" placeholder="Senha" required 
                       style="width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 15px; box-sizing: border-box; font-size: 10px; outline: none; background: #fafafa;">
                <i class="fa-regular fa-eye" style="position: absolute; right: 8px; bottom: 8px; font-size: 9px; color: #bbb; cursor: pointer;"></i>
            </div>

            <a href="#" style="display: block; text-align: center; color: #0081C9; text-decoration: none; font-size: 8px; margin-bottom: 25px; font-weight: bold;">Esqueceu?</a>

            <button type="submit" style="width: 100%; padding: 7px; background: #fff; border: 1px solid #0081C9; color: #0081C9; border-radius: 15px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 4px;">
                <i class="fa-solid fa-right-to-bracket" style="font-size: 9px;"></i> Entrar
            </button>
        </form>

        <span style="display: block; margin-top: 40px; color: #eee; font-size: 7px; font-family: monospace;">v 2026.03.12</span>
    </div>

</body>
</html>
