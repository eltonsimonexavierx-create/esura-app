{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body style="margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif;">

    <!-- Card "Magro" e Nítido: Reduzido para 180px -->
    <div style="width: 180px; text-align: center; box-sizing: border-box;">
        
        <!-- Logo: Dimensão nítida mas proporcional -->
        <img src="{% static 'img/logo_ujc.png' %}" style="width: 55px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto;">
        
        <p style="font-size: 8px; font-weight: 700; margin: 0; color: #777; text-transform: uppercase; letter-spacing: 0.8px;">Bem-vindo ao</p>
        <h1 style="font-size: 18px; font-weight: 900; margin: 2px 0 20px 0; color: #000; letter-spacing: -0.5px;">ESURA</h1>

        <form method="POST">
            {% csrf_token %}
            
            <!-- Campo Utilizador -->
            <div style="text-align: left; margin-bottom: 10px;">
                <label style="display: block; font-size: 8px; color: #444; margin-bottom: 3px; margin-left: 8px; font-weight: 800;">UTILIZADOR</label>
                <input type="text" name="username" required 
                       style="width: 100%; padding: 6px 12px; border: 1.5px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 11px; outline: none; background: #fff; color: #000;">
            </div>

            <!-- Campo Senha -->
            <div style="text-align: left; margin-bottom: 6px;">
                <label style="display: block; font-size: 8px; color: #444; margin-bottom: 3px; margin-left: 8px; font-weight: 800;">SENHA</label>
                <input type="password" name="password" required 
                       style="width: 100%; padding: 6px 12px; border: 1.5px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 11px; outline: none; background: #fff; color: #000;">
            </div>

            <a href="#" style="display: block; text-align: right; color: #0081C9; text-decoration: none; font-size: 8px; margin-bottom: 18px; font-weight: 800;">Esqueceu?</a>

            <!-- Botão: Bordas nítidas e contraste alto -->
            <button type="submit" style="width: 100%; padding: 8px; background: #0081C9; border: none; color: #fff; border-radius: 15px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 4px rgba(0,129,201,0.2);">
                Entrar <span style="margin-left: 5px;">➔</span>
            </button>
        </form>

        <span style="display: block; margin-top: 30px; color: #ccc; font-size: 7px; font-family: monospace; letter-spacing: 0.5px;">v 2026.03.12</span>
    </div>

</body>
</html>
