{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body style="margin:0; background:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div style="width:260px; padding:15px; border:1px solid #eee; border-radius:15px; text-align:center; box-sizing:border-box;">
        <img src="{% static 'img/logo_ujc.png' %}" style="width:80px; margin-bottom:10px;">
        <p style="font-size:11px; font-weight:600; margin:0; color:#555;">Bem-vindo ao</p>
        <h1 style="font-size:18px; font-weight:900; margin:0 0 15px 0; color:#000;">ESURA</h1>
        <form method="POST">
            {% csrf_token %}
            <div style="text-align:left; margin-bottom:10px;">
                <label style="display:block; font-size:10px; color:#888; margin-bottom:3px; margin-left:5px;">Utilizador/Email</label>
                <input type="text" name="username" required style="width:100%; padding:6px 12px; border:1px solid #ccc; border-radius:20px; box-sizing:border-box; font-size:12px; outline:none;">
            </div>
            <div style="text-align:left; margin-bottom:8px;">
                <label style="display:block; font-size:10px; color:#888; margin-bottom:3px; margin-left:5px;">Senha *</label>
                <input type="password" name="password" required style="width:100%; padding:6px 12px; border:1px solid #ccc; border-radius:20px; box-sizing:border-box; font-size:12px; outline:none;">
            </div>
            <a href="#" style="display:block; text-align:left; color:#0081C9; text-decoration:none; font-size:10px; margin-bottom:15px; margin-left:5px;">Esqueceu a senha?</a>
            <button type="submit" style="width:100%; padding:8px; background:#fff; border:1px solid #0081C9; color:#0081C9; border-radius:20px; font-size:13px; font-weight:bold; cursor:pointer;">➔ Entrar</button>
        </form>
        <span style="display:block; margin-top:20px; color:#ccc; font-size:8px;">v 2026.03.12-30431ca</span>
    </div>
</body>
</html>
