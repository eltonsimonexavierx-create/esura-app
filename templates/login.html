{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA</title>
</head>
<body style="margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif;">
    <div style="width: 100%; max-width: 340px; padding: 40px 25px; border: 1px solid #e0e0e0; border-radius: 25px; text-align: center; box-sizing: border-box;">
        
        <!-- O LOGOTIPO QUE ESTÁ NA TUA PASTA static/img/logo_ujc.png -->
        <img src="/static/img/logo_ujc.png" alt="Logotipo UJC" style="width: 150px; margin-bottom: 20px;">
        
        <p style="font-size: 18px; font-weight: bold; margin: 0; color: #333;">Bem-vindo ao</p>
        <h1 style="font-size: 26px; font-weight: 900; margin: 5px 0 35px 0; color: #000;">ESURA</h1>

        <form method="POST">
            {% csrf_token %}
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Utilizador/Email</label>
                <input type="text" name="username" required style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box; outline: none;">
            </div>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Senha *</label>
                <input type="password" name="password" required style="width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; box-sizing: border-box; outline: none;">
            </div>
            <button type="submit" style="width: 100%; padding: 12px; background: #fff; border: 1.5px solid #0081C9; color: #0081C9; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer;">→ Entrar</button>
        </form>
        <span style="display: block; margin-top: 40px; color: #aaa; font-size: 11px;">v 2026.03.12-30431ca</span>
    </div>
</body>
</html>
